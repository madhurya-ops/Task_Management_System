name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install

      - name: Build API
        run: npm run build -w @tms/api

      - name: Build Web
        run: npm run build -w @tms/web

      - name: Test API
        run: npm run test -w @tms/api

      - name: Test Web
        run: npm run test -w @tms/web
